
<style>
@keyframes move-carrier { 0%{transform:translateX(0)} 100%{transform:translateX(200px)} }
@keyframes signal-pulse { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:.7;transform:scale(1.4)} }
@keyframes hop { 0%,100%{opacity:.3} 50%{opacity:1} }
.carrier { animation: move-carrier 4s ease-in-out infinite alternate; }
.sp1 { animation: signal-pulse 2s infinite; }
.sp2 { animation: signal-pulse 2s infinite .5s; }
.sp3 { animation: signal-pulse 2s infinite 1s; }
.hop1 { animation: hop 1.6s infinite; }
.hop2 { animation: hop 1.6s infinite .4s; }
.hop3 { animation: hop 1.6s infinite .8s; }
.hop4 { animation: hop 1.6s infinite 1.2s; }
</style>
<svg width="100%" viewBox="0 0 680 400" role="img">
<title>DistanceBridge — comunicação de longa distância sem internet via DTN e LoRa</title>

<text font-family="monospace" font-size="8" fill="#0C447C" x="116" y="84" text-anchor="middle">até 500m · BLE + WiFi Direct</text>

<circle cx="160" cy="130" r="4" fill="#1D9E75"/>

<circle cx="140" cy="195" r="4" fill="#7F77DD"/>

<line x1="90" y1="150" x2="155" y2="132" stroke="#1D9E75" stroke-width="0.6" stroke-dasharray="3 2" fill="none"/>

  <rect x="310" y="110" width="40" height="24" rx="4" fill="#1a0f00" stroke="#BA7517" stroke-width="0.5"/>

</g>

<rect x="380" y="96" width="50" height="28" rx="4" fill="#1a0d2e" stroke="#534AB7" stroke-width="0.5"/>

<text font-family="monospace" font-size="8" fill="#444441" x="564" y="172" text-anchor="middle">alcance até 15km sem infra</text>

<text font-family="monospace" font-size="8" fill="#791F1F" x="564" y="230" text-anchor="middle">alertas de desastre, campo</text>

<text font-family="monospace" font-size="8" fill="#633806" x="258" y="352" text-anchor="middle">latência: minutos/horas</text>

<line x1="323" y1="330" x2="349" y2="330" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" fill="none"/>

<line x1="490" y1="330" x2="516" y2="330" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" fill="none"/>

<rect x="517" y="304" width="130" height="52" rx="6" fill="#1a0d0d" stroke="#A32D2D" stroke-width="0.5"/>
<text font-family="monospace" font-size="8" fill="#E24B4A" x="582" y="324" text-anchor="middle">peer no mundo</text>
<text font-family="monospace" font-size="8" fill="#791F1F" x="582" y="340" text-anchor="middle">→ DTN + satélite</text>
