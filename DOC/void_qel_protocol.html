
<style>
@keyframes flow1 { 0%{opacity:0;transform:translate(0,0)} 30%{opacity:1} 70%{opacity:1} 100%{opacity:0;transform:translate(340px,-80px)} }
@keyframes flow2 { 0%{opacity:0;transform:translate(0,0)} 30%{opacity:1} 70%{opacity:1} 100%{opacity:0;transform:translate(340px,0px)} }
@keyframes flow3 { 0%{opacity:0;transform:translate(0,0)} 30%{opacity:1} 70%{opacity:1} 100%{opacity:0;transform:translate(340px,80px)} }
@keyframes assemble { 0%,60%{opacity:0;transform:scale(.5)} 80%,100%{opacity:1;transform:scale(1)} }
@keyframes blink-cursor { 0%,100%{opacity:1} 49%{opacity:1} 50%{opacity:0} 99%{opacity:0} }
.p1 { animation: flow1 2.8s ease-in-out infinite; }
.p2 { animation: flow2 2.8s ease-in-out infinite .4s; }
.p3 { animation: flow3 2.8s ease-in-out infinite .8s; }
.assembled { animation: assemble 2.8s ease-in-out infinite; }
</style>
<svg width="100%" viewBox="0 0 680 360" role="img">
<title>QEL Protocol — fragmentação e reconstituição de mensagem</title>
<desc>Uma mensagem é fragmentada em 3 partículas independentes que viajam por caminhos diferentes e se reconstituem apenas no destino</desc>
<defs>
<marker id="aq" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="360" fill="#080b10" rx="12"/>

<text font-family="monospace" font-size="11" fill="#5F5E5A" x="30" y="32" letter-spacing="3">PROTOCOLO QEL — FRAGMENTAÇÃO QUÂNTICA</text>

<rect x="30" y="52" width="110" height="60" rx="8" fill="#0d1a2e" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="monospace" font-size="11" fill="#85B7EB" x="85" y="76" text-anchor="middle">ORIGEM</text>
<text font-family="monospace" font-size="9" fill="#378ADD" x="85" y="94" text-anchor="middle">msg fragmentada</text>
<text font-family="monospace" font-size="9" fill="#444441" x="85" y="106" text-anchor="middle">em 3 shards</text>

<line x1="140" y1="82" x2="220" y2="42" stroke="#1D9E75" stroke-width="0.6" stroke-dasharray="4 3" fill="none"/>
<line x1="140" y1="82" x2="220" y2="82" stroke="#1D9E75" stroke-width="0.6" stroke-dasharray="4 3" fill="none"/>
<line x1="140" y1="82" x2="220" y2="122" stroke="#1D9E75" stroke-width="0.6" stroke-dasharray="4 3" fill="none"/>

<text font-family="monospace" font-size="9" fill="#0F6E56" x="180" y="26" text-anchor="middle">caminho A</text>
<text font-family="monospace" font-size="9" fill="#0F6E56" x="180" y="72" text-anchor="middle">caminho B</text>
<text font-family="monospace" font-size="9" fill="#0F6E56" x="180" y="136" text-anchor="middle">caminho C</text>

<rect x="220" y="20" width="82" height="44" rx="6" fill="#0d2b1a" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="monospace" font-size="9" fill="#5DCAA5" x="261" y="40" text-anchor="middle">SHARD A</text>
<text font-family="monospace" font-size="8" fill="#0F6E56" x="261" y="54" text-anchor="middle">1/3 da msg</text>

<rect x="220" y="60" width="82" height="44" rx="6" fill="#0d2b1a" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="monospace" font-size="9" fill="#5DCAA5" x="261" y="80" text-anchor="middle">SHARD B</text>
<text font-family="monospace" font-size="8" fill="#0F6E56" x="261" y="94" text-anchor="middle">1/3 da msg</text>

<rect x="220" y="100" width="82" height="44" rx="6" fill="#0d2b1a" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="monospace" font-size="9" fill="#5DCAA5" x="261" y="120" text-anchor="middle">SHARD C</text>
<text font-family="monospace" font-size="8" fill="#0F6E56" x="261" y="134" text-anchor="middle">1/3 da msg</text>

<rect x="320" y="20" width="90" height="44" rx="6" fill="#0d1f0d" stroke="#3B6D11" stroke-width="0.5"/>
<text font-family="monospace" font-size="9" fill="#97C459" x="365" y="40" text-anchor="middle">NÓ RELAY A</text>
<text font-family="monospace" font-size="8" fill="#3B6D11" x="365" y="55" text-anchor="middle">não tem B nem C</text>

<rect x="320" y="60" width="90" height="44" rx="6" fill="#0d1f0d" stroke="#3B6D11" stroke-width="0.5"/>
<text font-family="monospace" font-size="9" fill="#97C459" x="365" y="80" text-anchor="middle">NÓ RELAY B</text>
<text font-family="monospace" font-size="8" fill="#3B6D11" x="365" y="95" text-anchor="middle">não tem A nem C</text>

<rect x="320" y="100" width="90" height="44" rx="6" fill="#0d1f0d" stroke="#3B6D11" stroke-width="0.5"/>
<text font-family="monospace" font-size="9" fill="#97C459" x="365" y="120" text-anchor="middle">NÓ RELAY C</text>
<text font-family="monospace" font-size="8" fill="#3B6D11" x="365" y="135" text-anchor="middle">não tem A nem B</text>

<line x1="302" y1="42" x2="318" y2="42" stroke="#1D9E75" stroke-width="0.6" marker-end="url(#aq)" fill="none"/>
<line x1="302" y1="82" x2="318" y2="82" stroke="#1D9E75" stroke-width="0.6" marker-end="url(#aq)" fill="none"/>
<line x1="302" y1="122" x2="318" y2="122" stroke="#1D9E75" stroke-width="0.6" marker-end="url(#aq)" fill="none"/>

<line x1="410" y1="42" x2="510" y2="82" stroke="#7F77DD" stroke-width="0.6" stroke-dasharray="4 3" fill="none"/>
<line x1="410" y1="82" x2="510" y2="82" stroke="#7F77DD" stroke-width="0.6" stroke-dasharray="4 3" fill="none"/>
<line x1="410" y1="122" x2="510" y2="82" stroke="#7F77DD" stroke-width="0.6" stroke-dasharray="4 3" fill="none"/>

<rect x="510" y="52" width="130" height="60" rx="8" fill="#1a0d2e" stroke="#534AB7" stroke-width="0.8"/>
<text font-family="monospace" font-size="11" fill="#AFA9EC" x="575" y="78" text-anchor="middle">DESTINO</text>
<text font-family="monospace" font-size="9" fill="#7F77DD" x="575" y="94" text-anchor="middle">3 shards → msg</text>
<text font-family="monospace" font-size="9" fill="#534AB7" x="575" y="108" text-anchor="middle">reconstituída</text>

<rect x="30" y="175" width="620" height="140" rx="10" fill="#0a0d12" stroke="#2C2C2A" stroke-width="0.5"/>
<text font-family="monospace" font-size="11" fill="#888780" x="340" y="200" text-anchor="middle" letter-spacing="2">POR QUE ISSO É INÉDITO</text>

<rect x="50" y="215" width="170" height="84" rx="6" fill="#0d1a2e" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="monospace" font-size="10" fill="#85B7EB" x="135" y="235" text-anchor="middle">Nenhum relay</text>
<text font-family="monospace" font-size="10" fill="#85B7EB" x="135" y="249" text-anchor="middle">tem a mensagem</text>
<text font-family="monospace" font-size="8" fill="#0C447C" x="135" y="267" text-anchor="middle">Threshold: K-de-N shards</text>
<text font-family="monospace" font-size="8" fill="#0C447C" x="135" y="281" text-anchor="middle">necessários p/ reconstituir</text>
<text font-family="monospace" font-size="8" fill="#0C447C" x="135" y="295" text-anchor="middle">→ interceptar 1 rota = lixo</text>

<rect x="245" y="215" width="170" height="84" rx="6" fill="#0d2b1a" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="monospace" font-size="10" fill="#5DCAA5" x="330" y="235" text-anchor="middle">Caminhos</text>
<text font-family="monospace" font-size="10" fill="#5DCAA5" x="330" y="249" text-anchor="middle">recalculados</text>
<text font-family="monospace" font-size="8" fill="#0F6E56" x="330" y="267" text-anchor="middle">por mensagem — nunca</text>
<text font-family="monospace" font-size="8" fill="#0F6E56" x="330" y="281" text-anchor="middle">o mesmo caminho</text>
<text font-family="monospace" font-size="8" fill="#0F6E56" x="330" y="295" text-anchor="middle">→ anti correlação</text>

<rect x="440" y="215" width="190" height="84" rx="6" fill="#1a0d2e" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="monospace" font-size="10" fill="#AFA9EC" x="535" y="235" text-anchor="middle">Funciona offline</text>
<text font-family="monospace" font-size="10" fill="#AFA9EC" x="535" y="249" text-anchor="middle">e longa distância</text>
<text font-family="monospace" font-size="8" fill="#3C3489" x="535" y="267" text-anchor="middle">shards podem viajar via</text>
<text font-family="monospace" font-size="8" fill="#3C3489" x="535" y="281" text-anchor="middle">BLE, WiFi, LoRa, SMS</text>
<text font-family="monospace" font-size="8" fill="#3C3489" x="535" y="295" text-anchor="middle">→ mesh de qualquer alcance</text>
</svg>
